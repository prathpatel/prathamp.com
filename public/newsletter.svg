<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="envelope" x1="120" y1="112" x2="280" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="paper" x1="155" y1="60" x2="245" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.07" fill="#a8a29e">
    <circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="160" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/><circle cx="240" cy="40" r="1.5"/><circle cx="280" cy="40" r="1.5"/><circle cx="320" cy="40" r="1.5"/><circle cx="360" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/><circle cx="80" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/><circle cx="280" cy="80" r="1.5"/><circle cx="320" cy="80" r="1.5"/><circle cx="360" cy="80" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/><circle cx="80" cy="120" r="1.5"/><circle cx="320" cy="120" r="1.5"/><circle cx="360" cy="120" r="1.5"/>
    <circle cx="40" cy="160" r="1.5"/><circle cx="80" cy="160" r="1.5"/><circle cx="320" cy="160" r="1.5"/><circle cx="360" cy="160" r="1.5"/>
    <circle cx="40" cy="200" r="1.5"/><circle cx="80" cy="200" r="1.5"/><circle cx="120" cy="200" r="1.5"/><circle cx="280" cy="200" r="1.5"/><circle cx="320" cy="200" r="1.5"/><circle cx="360" cy="200" r="1.5"/>
    <circle cx="40" cy="240" r="1.5"/><circle cx="80" cy="240" r="1.5"/><circle cx="120" cy="240" r="1.5"/><circle cx="160" cy="240" r="1.5"/><circle cx="200" cy="240" r="1.5"/><circle cx="240" cy="240" r="1.5"/><circle cx="280" cy="240" r="1.5"/><circle cx="320" cy="240" r="1.5"/><circle cx="360" cy="240" r="1.5"/>
  </g>

  <!-- Ember glow behind envelope -->
  <ellipse cx="200" cy="140" rx="120" ry="80" fill="url(#glow)"/>

  <!-- Paper coming out of envelope -->
  <g transform="translate(0, -8)">
    <rect x="155" y="64" width="90" height="74" rx="5" fill="url(#paper)"/>
    <!-- Lines on paper (representing text) -->
    <rect x="168" y="78" width="50" height="3" rx="1.5" fill="#c2410c" opacity="0.32"/>
    <rect x="168" y="86" width="64" height="3" rx="1.5" fill="#57534e" opacity="0.28"/>
    <rect x="168" y="94" width="40" height="3" rx="1.5" fill="#57534e" opacity="0.22"/>
    <!-- Small sigma symbol on paper -->
    <text x="177" y="122" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" fill="#c2410c" opacity="0.55">&#x03A3;</text>
    <!-- Small graph icon -->
    <polyline points="210,120 218,110 226,116 234,104" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" fill="none"/>
  </g>

  <!-- Envelope body -->
  <g transform="translate(0, -8)">
    <path d="M120,120 L280,120 L280,200 L120,200 Z" fill="url(#envelope)"/>
    <!-- Envelope flap -->
    <path d="M120,120 L200,165 L280,120" fill="#9a3412" opacity="0.85"/>
    <!-- Envelope fold line -->
    <path d="M120,120 L200,170 L280,120" stroke="#fdba74" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Bottom fold lines -->
    <path d="M120,200 L175,160" stroke="#7c2d12" stroke-width="0.75" opacity="0.4"/>
    <path d="M280,200 L225,160" stroke="#7c2d12" stroke-width="0.75" opacity="0.4"/>
  </g>

  <!-- Floating @ symbol -->
  <text x="88" y="108" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" fill="#fb923c" opacity="0.28" transform="rotate(-15, 88, 108)">@</text>

  <!-- Small bell icon -->
  <g transform="translate(300, 88)" opacity="0.28" stroke="#fb923c" stroke-width="1.5" fill="none">
    <path d="M8,0 C8,0 12,4 12,8 L12,12 L4,12 L4,8 C4,4 8,0 8,0Z"/>
    <line x1="6" y1="14" x2="10" y2="14"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="105" cy="160" r="2" fill="#f97316" opacity="0.22"/>
  <circle cx="295" cy="140" r="2" fill="#fb923c" opacity="0.22"/>
  <circle cx="140" cy="80" r="1.5" fill="#fb923c" opacity="0.18"/>
  <circle cx="265" cy="86" r="1.5" fill="#f97316" opacity="0.18"/>

  <!-- Mono label -->
  <text x="200" y="222" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="9" font-weight="500" fill="#fb923c" letter-spacing="2.5">
    &#8212; NEWSLETTER
  </text>

  <!-- Heading -->
  <text x="200" y="244" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif" font-size="15" font-weight="700" fill="#fafaf9" letter-spacing="-0.3">
    Stay in the loop
  </text>
</svg>
